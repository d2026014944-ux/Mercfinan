services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_predictor
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: market_predictor
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db
    ports:
      - "8000:8000"

  data_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: market_predictor
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db
